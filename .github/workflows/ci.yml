name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  shared-types:
    name: shared-types (build + type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@support-saas/shared-types
      - run: npm run type-check --workspace=@support-saas/shared-types

  api:
    name: api (lint + type-check + test)
    runs-on: ubuntu-latest
    needs: shared-types
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      MONGO_URL: mongodb://test:test@localhost:27017/test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_at_least_16_chars
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_16_chars
      WIDGET_JWT_SECRET: ci_widget_secret_at_least_16_chars
      KAFKA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@support-saas/shared-types
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
      - run: npm run lint --workspace=@support-saas/api
      - run: npm run type-check --workspace=@support-saas/api
      - run: npm test --workspace=@support-saas/api

  web:
    name: web (lint + type-check + build)
    runs-on: ubuntu-latest
    needs: shared-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@support-saas/shared-types
      - run: npm run lint --workspace=@support-saas/web
      - run: npm run type-check --workspace=@support-saas/web
      - name: Build (with dummy env — no live backend needed to build)
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_AI_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

  ai-service:
    name: ai-service (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai-service/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: apps/ai-service
      - run: python -m pytest -v
        working-directory: apps/ai-service

  docker-build:
    name: Docker images build (no push)
    runs-on: ubuntu-latest
    needs: [api, web, ai-service]
    strategy:
      matrix:
        service: [api, web, ai-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: false
          tags: support-saas-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
