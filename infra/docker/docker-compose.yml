name: support-saas

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  saas-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  es-data:
  qdrant-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:

services:
  # ------------------------------------------------------------------
  # Data stores
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-support_saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [saas-net]
    logging: *default-logging

  mongodb:
    image: mongo:7
    container_name: saas-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-saas_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-saas_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-support_saas_docs}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [saas-net]
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-saas_dev_password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-saas_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [saas-net]
    logging: *default-logging

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    container_name: saas-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [saas-net]
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: saas-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [saas-net]
    logging: *default-logging

  # ------------------------------------------------------------------
  # Messaging
  # ------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: saas-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks: [saas-net]
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: saas-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [saas-net]
    logging: *default-logging

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: saas-kafdrop
    restart: unless-stopped
    depends_on: [kafka]
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: -Xms32M -Xmx64M
    ports:
      - "9000:9000"
    networks: [saas-net]
    logging: *default-logging

  # ------------------------------------------------------------------
  # Application services (enabled from Phase 2 / 3 / 5 onward)
  # ------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: development
    container_name: saas-api
    restart: unless-stopped
    profiles: ["apps"]
    env_file: [../../apps/api/.env]
    # These override the .env file above on purpose: that file is written
    # for host-side `npm run dev` (localhost), but this container runs on
    # the Docker network where services are reachable by container name.
    environment:
      DATABASE_URL: postgresql://saas_admin:saas_dev_password@postgres:5432/support_saas
      MONGO_URL: mongodb://saas_admin:saas_dev_password@mongodb:27017/support_saas_docs?authSource=admin
      REDIS_URL: redis://:saas_dev_password@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      KAFKA_BROKERS: kafka:29092
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../../apps/api:/app
      - /app/node_modules
    networks: [saas-net]
    logging: *default-logging

  ai-service:
    build:
      context: ../../apps/ai-service
      dockerfile: Dockerfile
    container_name: saas-ai-service
    restart: unless-stopped
    profiles: ["apps"]
    env_file: [../../apps/ai-service/.env]
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ../../apps/ai-service:/app
    networks: [saas-net]
    logging: *default-logging

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: development
    container_name: saas-web
    restart: unless-stopped
    profiles: ["apps"]
    env_file: [../../apps/web/.env.local]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000 # this reaches the browser, so it stays host-facing
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on: [api]
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next
    networks: [saas-net]
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: saas-nginx
    restart: unless-stopped
    profiles: ["apps"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on: [web, api]
    networks: [saas-net]
    logging: *default-logging
