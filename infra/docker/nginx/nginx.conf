worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:4000;
  }

  upstream ai_upstream {
    server ai-service:8000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # REST API
    location /api/ {
      proxy_pass http://api_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO realtime channel (tickets, chat, presence)
    location /socket.io/ {
      proxy_pass http://api_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    # AI microservice (RAG, auto-responses, summarization)
    location /ai/ {
      proxy_pass http://ai_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_read_timeout 120s;
    }

    # Next.js frontend
    location / {
      proxy_pass http://web_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
