apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: support-saas
  labels:
    app.kubernetes.io/name: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-service
    spec:
      containers:
        - name: ai-service
          image: ai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: support-saas-config
            - secretRef:
                name: support-saas-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: support-saas
spec:
  selector:
    app.kubernetes.io/name: ai-service
  ports:
    - port: 8000
      targetPort: 8000
      name: http
