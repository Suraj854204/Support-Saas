apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: support-saas
  labels:
    app.kubernetes.io/name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: api
          image: api:latest # replaced by the CD pipeline / kustomize overlay
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: support-saas-config
            - secretRef:
                name: support-saas-secrets
          env:
            - name: AI_SERVICE_URL
              value: "http://ai-service:8000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: support-saas
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - port: 4000
      targetPort: 4000
      name: http
