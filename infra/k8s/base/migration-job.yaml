apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: support-saas
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: api:latest # same image as the api Deployment — same overlay sets this tag
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: support-saas-config
            - secretRef:
                name: support-saas-secrets
