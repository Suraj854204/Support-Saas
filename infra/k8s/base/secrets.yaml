# ---------------------------------------------------------------------------
# TEMPLATE ONLY. Do not commit real secret values to git.
#
# In a real deployment, replace this file with one of:
#   - External Secrets Operator syncing from AWS Secrets Manager / SSM
#   - Sealed Secrets (bitnami-labs/sealed-secrets), committing only the
#     encrypted SealedSecret resource
#   - `kubectl create secret generic ... --from-literal=...` applied out of
