# so the required keys are documented in one place.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: support-saas-secrets
  namespace: support-saas
type: Opaque
stringData:
  DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/support_saas"
  MONGO_URL: "mongodb://CHANGE_ME:CHANGE_ME@mongodb:27017/support_saas_docs?authSource=admin"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
  JWT_ACCESS_SECRET: "CHANGE_ME_32_CHAR_MINIMUM_SECRET"
  JWT_REFRESH_SECRET: "CHANGE_ME_32_CHAR_MINIMUM_SECRET"
  WIDGET_JWT_SECRET: "CHANGE_ME_32_CHAR_MINIMUM_SECRET"
  GOOGLE_API_KEY: "CHANGE_ME"
