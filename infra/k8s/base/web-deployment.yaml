apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: support-saas
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: support-saas-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: support-saas
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - port: 3000
      targetPort: 3000
      name: http
