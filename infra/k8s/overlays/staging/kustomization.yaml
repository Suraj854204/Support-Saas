apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: support-saas

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: ai-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1

configMapGenerator:
  - name: support-saas-config
    behavior: merge
    literals:
      - NEXT_PUBLIC_APP_URL=https://staging.app.example.com
      - NEXT_PUBLIC_API_URL=https://staging.api.example.com
      - CORS_ORIGINS=https://staging.app.example.com

images:
  - name: api
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/support-saas-api
    newTag: latest
  - name: web
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/support-saas-web
    newTag: latest
  - name: ai-service
    newName: 123456789.dkr.ecr.us-east-1.amazonaws.com/support-saas-ai-service
    newTag: latest
